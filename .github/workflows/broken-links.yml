name: Check for broken links

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          fail: true
          # --base resolves root-relative links (/blog/..., /cv/, /assets/...)
          #   against the live site, since they're Jekyll permalinks not source files.
          #   (lychee in lychee-action@v1.9.0 uses --base, not the newer --base-url.)
          # --max-concurrency 8 / --timeout 30 / --max-retries 5 / --retry-wait-time 2:
          #   lychee defaults to 128 concurrent requests, whose burst trips
          #   rate-limits/timeouts on big hosts (e.g. media.mit.edu) intermittently.
          #   Lower concurrency + retries + a longer timeout make the check reliable.
          # --exclude: hosts that can't be verified from CI at all.
          #   linkedin.com returns 999 to all bots; vermonthoyas.com responds
          #   fine to browsers but consistently blocks GitHub's datacenter IPs.
          #   Both are valid links for human readers, just not CI-checkable.
          # --exclude-path: md files with liquid tags that lychee mis-parses.
          args: --user-agent 'curl/7.54' --base https://elinorp-d.github.io --max-concurrency 8 --timeout 30 --max-retries 5 --retry-wait-time 2 --exclude 'linkedin\.com|vermonthoyas\.com' --exclude-path README.md --exclude-path _pages/404.md --exclude-path _pages/blog.md --verbose --no-progress './**/*.md' './**/*.html'
