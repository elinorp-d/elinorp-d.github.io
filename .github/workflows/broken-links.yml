name: Check for broken links

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker 🔗
        # Run lychee's official image pinned to 0.24.2 (the version used for local
        #   verification, so CI mirrors local). We invoke the image directly rather
        #   than lychee-action because the action's binary installer can't handle the
        #   nested tarball layout of lychee >=0.24, and --accept-timeouts needs >=0.24.
        # The docker exit code fails the step on real errors (replaces the action's
        #   `fail: true`); --accept-timeouts means timeouts alone won't fail it.
        # Flags:
        #   --base-url       resolve root-relative links (/blog, /cv, /assets) against
        #                    the live site (they're Jekyll permalinks, not source files)
        #   --accept-timeouts tolerate transient slowness / datacenter-IP throttling;
        #                    genuine 404s still fail
        #   --max-concurrency 8  avoid the default 128-request burst that trips host
        #                    rate-limits/timeouts (e.g. media.mit.edu)
        #   --timeout/retries kept modest so the run stays fast
        #   --exclude        linkedin.com (returns 999 to all bots) and vermonthoyas.com
        #                    (blocks GitHub datacenter IPs) — valid links, not CI-checkable
        #   --exclude-path   md files with liquid tags that lychee mis-parses
        run: |
          docker run --rm -v "${{ github.workspace }}:/input" -w /input lycheeverse/lychee:0.24.2 \
            --user-agent 'curl/7.54' \
            --base-url https://elinorp-d.github.io \
            --accept-timeouts \
            --max-concurrency 8 --timeout 20 --max-retries 2 --retry-wait-time 1 \
            --exclude 'linkedin\.com|vermonthoyas\.com' \
            --exclude-path README.md --exclude-path _pages/404.md --exclude-path _pages/blog.md \
            --no-progress './**/*.md' './**/*.html'
